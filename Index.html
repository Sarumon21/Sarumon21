
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S21 V8</title>

<style>
body{
margin:0;
padding:20px;
background:#0f0f10;
color:white;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.container{
max-width:700px;
margin:auto;
}

.title{
text-align:center;
font-size:34px;
font-weight:800;
margin-bottom:20px;
}

.card{
background:#1c1c1e;
border-radius:18px;
padding:18px;
margin-bottom:18px;
}

input,select{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#2c2c2e;
color:white;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
font-size:17px;
font-weight:700;
margin-top:12px;
}

.start{background:#0A84FF;color:white;}
.break{background:#FF9F0A;color:black;}
.finish{background:#30D158;color:black;}

.info{
margin-top:8px;
opacity:0.9;
}

.history{
background:#2c2c2e;
border-radius:14px;
padding:14px;
margin-top:14px;
line-height:1.7;
}
</style>
</head>

<body>

<div class="container">

<div class="title">S21 V8</div>

<div class="card">

<input id="date" type="date">

<input id="vehicle" placeholder="Rejestracja pojazdu">

<input id="trailer" placeholder="Numer naczepy">

<input id="startMileage" placeholder="Start mileage">

<input id="finishMileage" placeholder="Finish mileage">

<input id="parking" placeholder="Miejsce postoju">

<select id="workType">
<option value="">Wykorzystany czas pracy</option>
<option>13 godzin</option>
<option>15 godzin</option>
<option>Skrócony czas pracy</option>
</select>

</div>

<div class="card">

<div id="startInfo">Start: --:--</div>
<div class="info" id="finishInfo">Finish: --:--</div>
<div class="info" id="breakInfo">Pauza: 0 min</div>
<div class="info" id="workInfo">Czas pracy: 00:00</div>
<div class="info" id="mileageInfo">Mileage today: 0 mil</div>

<button class="start" onclick="startShift()">START SHIFT</button>

<button class="break" onclick="toggleBreak(this)">START BREAK</button>

<button class="finish" onclick="finishShift()">FINISH SHIFT</button>

</div>

<div class="card">
<h2>Historia dni</h2>
<div id="history"></div>
</div>

</div>

<script>

let started=false
let onBreak=false
let startTime=null
let finishTime=null
let breakStart=null
let totalBreak=0
let timer=null

document.getElementById("date").valueAsDate = new Date()

function startShift(){

startTime=new Date()
started=true

document.getElementById("startInfo").innerText =
"Start: " + formatTime(startTime)

clearInterval(timer)
timer=setInterval(updateWorkTime,1000)
}

function toggleBreak(btn){

if(!started) return

if(!onBreak){

breakStart=new Date()
onBreak=true
btn.innerText="END BREAK"

}else{

const mins=Math.floor((new Date()-breakStart)/60000)

totalBreak+=mins

document.getElementById("breakInfo").innerText =
"Pauza: " + totalBreak + " min"

onBreak=false
btn.innerText="START BREAK"
}
}

function updateWorkTime(){

if(!started) return

let mins=Math.floor((new Date()-startTime)/60000)

mins-=totalBreak

const h=String(Math.floor(mins/60)).padStart(2,'0')
const m=String(mins%60).padStart(2,'0')

document.getElementById("workInfo").innerText =
"Czas pracy: " + h + ":" + m
}

function finishShift(){

if(!started) return

finishTime=new Date()

document.getElementById("finishInfo").innerText =
"Finish: " + formatTime(finishTime)

const date=document.getElementById("date").value
const vehicle=document.getElementById("vehicle").value
const trailer=document.getElementById("trailer").value
const parking=document.getElementById("parking").value
const workType=document.getElementById("workType").value

const startMileage=parseInt(document.getElementById("startMileage").value || 0)
const finishMileage=parseInt(document.getElementById("finishMileage").value || 0)

const mileage=finishMileage-startMileage

document.getElementById("mileageInfo").innerText =
"Mileage today: " + mileage + " mil"

const div=document.createElement("div")
div.className="history"

div.innerHTML = `
<b>Data:</b> ${date}<br>
<b>Start:</b> ${formatTime(startTime)}<br>
<b>Finish:</b> ${formatTime(finishTime)}<br>
<b>Pojazd:</b> ${vehicle}<br>
<b>Naczepa:</b> ${trailer}<br>
<b>Start mileage:</b> ${startMileage}<br>
<b>Finish mileage:</b> ${finishMileage}<br>
<b>Dzisiejszy przebieg:</b> ${mileage} mil<br>
<b>Miejsce postoju:</b> ${parking}<br>
<b>Pauza:</b> ${totalBreak} min<br>
<b>Wykorzystane:</b> ${workType}
`

document.getElementById("history").prepend(div)

localStorage.setItem("s21history",
document.getElementById("history").innerHTML)

started=false
totalBreak=0
}

function formatTime(date){
return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
}

window.onload=function(){

const saved=localStorage.getItem("s21history")

if(saved){
document.getElementById("history").innerHTML=saved
}
}

</script>

</body>
</html>
