<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>S21 V8</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
padding:max(20px, env(safe-area-inset-top)) 16px 40px 16px;
background:#0b0b0c;
color:white;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
overflow-x:hidden;
}

.container{
width:100%;
max-width:680px;
margin:auto;
}

.title{
text-align:center;
font-size:48px;
font-weight:900;
margin:20px 0 24px 0;
}

.card{
background:#17171a;
border-radius:24px;
padding:18px;
margin-bottom:18px;
width:100%;
}

input, select{
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:16px;
background:#2a2a30;
color:white;
font-size:17px;
appearance:none;
-webkit-appearance:none;
}

button{
width:100%;
padding:18px;
margin-top:14px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:800;
}

.start{
background:#0A84FF;
color:white;
}

.break{
background:#ff9f0a;
color:black;
}

.finish{
background:#30d158;
color:black;
}

.info{
font-size:20px;
margin-top:14px;
line-height:1.5;
}

.history{
margin-top:14px;
padding:16px;
border-radius:18px;
background:#2a2a30;
line-height:1.8;
font-size:16px;
}

@media (max-width:430px){

.title{
font-size:42px;
}

.info{
font-size:18px;
}

button{
font-size:17px;
padding:16px;
}

}
</style>
</head>

<body>

<div class="container">

<div class="title">S21 V8</div>

<div class="card">

<input type="date">

<input placeholder="Rejestracja pojazdu">

<input placeholder="Numer naczepy">

<input placeholder="Start mileage">

<input placeholder="Finish mileage">

<input placeholder="Miejsce postoju">

<select>
<option>Wykorzystany czas pracy</option>
<option>13 godzin</option>
<option>15 godzin</option>
<option>Skrócony czas pracy</option>
</select>

</div>

<div class="card">

<div class="info">Start: --:--</div>
<div class="info">Finish: --:--</div>
<div class="info">Pauza: 0 min</div>
<div class="info">Czas pracy: 00:00</div>
<div class="info">Mileage today: 0 mil</div>

<button class="start">START SHIFT</button>

<button class="break">START BREAK</button>

<button class="finish">FINISH SHIFT</button>

</div>

<div class="card">

<h2>Historia dni</h2>

<div class="history">
Tutaj będą zapisane zakończone dni pracy.
</div>

</div>

</div>

</body>
</html>
